name: HoraCerta CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: horacerta
          POSTGRES_PASSWORD: horacerta123
          POSTGRES_DB: horacerta
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U horacerta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://horacerta:horacerta123@localhost:5433/horacerta
      SECRET_KEY: ci-test-secret-key
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar migrations
        run: alembic upgrade head

      - name: Rodar testes
        run: pytest tests/ -v --tb=short

      - name: Resultado
        if: always()
        run: echo "CI concluído"
